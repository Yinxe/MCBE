# Build & Release — 自动构建发布
#
# 触发方式:
#   git tag <name>@<version>   → 构建并发布 Release
#   workflow_dispatch          → 手动指定模组名和版本号
#
# 模组注册: 无需修改本文件，只需在:
#   mcaddon/<name>/package.json  或  server-plugin/<name>/package.json
# 中按规范配置 mcbe 字段即可自动注册。

name: Build & Release

on:
  push:
    tags:
      - "*@*"
  create:
  workflow_dispatch:
    inputs:
      mod:
        description: "包名 (如 mock-player, antibundledup)"
        required: true
        type: string
      version:
        description: "版本号 (如 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    if: |
      github.event_name != 'create' ||
      (startsWith(github.ref, 'refs/tags/') && contains(github.ref, '@'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # ── 解析 tag → 包名 + 版本号 ────────────────────────────
      - name: Parse tag / input
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "create" ]; then
            TAG="${{ github.ref_name }}"
            PKG="${TAG%%@*}"
            VER="${TAG#*@}"
          else
            PKG="${{ inputs.mod }}"
            VER="${{ inputs.version }}"
          fi
          echo "pkg=$PKG" | tee -a "$GITHUB_OUTPUT"
          echo "version=$VER" | tee -a "$GITHUB_OUTPUT"

      # ── 动态解析项目目录（mcaddon/ 或 server-plugin/） ─────
      - name: Resolve project directory
        id: resolve
        run: |
          PKG="${{ steps.parse.outputs.pkg }}"
          found=false
          for base in mcaddon server-plugin; do
            if [ -f "$base/$PKG/package.json" ]; then
              echo "dir=$base/$PKG" | tee -a "$GITHUB_OUTPUT"
              found=true
              break
            fi
          done
          if [ "$found" != "true" ]; then
            echo "::error::Project '$PKG' not found in mcaddon/ or server-plugin/"
            exit 1
          fi

      # ── 读取 mcbe 配置 ──────────────────────────────────────
      - name: Read mcbe config
        id: config
        run: |
          DIR="${{ steps.resolve.outputs.dir }}"
          HAS_BUILD=$(jq 'has("scripts") and (.scripts | has("build"))' "$DIR/package.json")
          HAS_RP=$(jq '.mcbe | has("rp")' "$DIR/package.json")
          PACK_NAME=$(jq -r '.mcbe.packName // .name' "$DIR/package.json")

          if [ "$HAS_RP" = "true" ]; then
            ARTIFACT_EXT="mcaddon"
          else
            ARTIFACT_EXT="mcpack"
          fi

          echo "hasBuild=$HAS_BUILD" | tee -a "$GITHUB_OUTPUT"
          echo "packName=$PACK_NAME" | tee -a "$GITHUB_OUTPUT"
          echo "artifactExt=$ARTIFACT_EXT" | tee -a "$GITHUB_OUTPUT"

      # ── 安装依赖 ────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 设置版本号 ──────────────────────────────────────────
      - name: Set version
        run: |
          DIR="${{ steps.resolve.outputs.dir }}"
          cd "$DIR" && npm pkg set version="${{ steps.parse.outputs.version }}"

      # ── 构建（有 build 脚本才执行） ────────────────────────
      - name: Build
        if: steps.config.outputs.hasBuild == 'true'
        run: pnpm --filter "${{ steps.parse.outputs.pkg }}" run build

      # ── 打包 ────────────────────────────────────────────────
      - name: Pack
        run: pnpm --filter "${{ steps.parse.outputs.pkg }}" run pack

      # ── 查找产物 ────────────────────────────────────────────
      - name: Locate artifact
        id: artifact
        run: |
          DIR="${{ steps.resolve.outputs.dir }}"
          EXT="${{ steps.config.outputs.artifactExt }}"
          PKG="${{ steps.parse.outputs.pkg }}"
          VER="${{ steps.parse.outputs.version }}"
          ARTIFACT=$(find "$DIR/dist/packages" -name "${PKG}-v${VER}.${EXT}" -type f 2>/dev/null | head -1)

          if [ -z "$ARTIFACT" ]; then
            # 兜底：找不到标准命名的文件时模糊搜索
            ARTIFACT=$(find "$DIR/dist/packages" -name "*.${EXT}" ! -name "*_bp*" ! -name "*_rp*" -type f 2>/dev/null | head -1)
          fi

          echo "path=$ARTIFACT" | tee -a "$GITHUB_OUTPUT"

      # ── 生成 Release Notes ──────────────────────────────
      # 只用 tag 所在提交的 commit message，不用 git log 范围
      # （多个模组混提时 log 范围会包含无关提交）
      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.parse.outputs.pkg }}@${{ steps.parse.outputs.version }}"
          NOTES=$(git log --format="* %s" -1 "$TAG" 2>/dev/null || true)
          if [ -z "${NOTES:-}" ]; then
            NOTES="🎉 ${{ steps.config.outputs.packName }} ${{ steps.parse.outputs.version }} 首次发布"
          fi
          NOTES="${NOTES//'%'/'%25'}"
          NOTES="${NOTES//$'\n'/'%0A'}"
          NOTES="${NOTES//$'\r'/'%0D'}"
          echo "notes=$NOTES" | tee -a "$GITHUB_OUTPUT"

      # ── 上传到 GitHub Release ───────────────────────────────
      - name: Upload to release
        if: steps.artifact.outputs.path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.parse.outputs.pkg }}@${{ steps.parse.outputs.version }}"
          FILE="${{ steps.artifact.outputs.path }}"
          CN="${{ steps.config.outputs.packName }}"
          VERSION="${{ steps.parse.outputs.version }}"
          IS_PR=""; echo "$VERSION" | grep -qiE 'beta|alpha|rc|pre' && IS_PR="--prerelease"

          cp "$FILE" "/tmp/$(basename "$FILE")"

          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" "/tmp/$(basename "$FILE")" --clobber
          else
            gh release create "$TAG" "/tmp/$(basename "$FILE")" \
              --title "$CN $VERSION" \
              --notes "${{ steps.notes.outputs.notes }}" \
              ${IS_PR}
          fi

      # ── workflow_dispatch 额外上传到 Actions 构建产物 ──────
      - name: Upload as artifact
        if: github.event_name == 'workflow_dispatch' && steps.artifact.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.config.outputs.packName }}-${{ steps.parse.outputs.version }}
          path: ${{ steps.artifact.outputs.path }}
