name: Build & Release

on:
  push:
    tags:
      - "*@*"
  workflow_dispatch:
    inputs:
      mod:
        description: "模组名 (如 mock-player, smartwarehouse)"
        required: true
        type: string
      version:
        description: "版本号 (如 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Parse tag / input
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            PKG="${TAG%%@*}"
            VER="${TAG#*@}"
          else
            PKG="${{ inputs.mod }}"
            VER="${{ inputs.version }}"
          fi
          echo "pkg=$PKG" >> $GITHUB_OUTPUT
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Resolve mod directory
        id: resolve
        run: |
          PKG="${{ steps.parse.outputs.pkg }}"
          case "$PKG" in
            mock-player)        DIR=mock-player;             FILTER=mock-player ;;
            keepinventory) DIR=keepinventory;   FILTER=keepinventory ;;
            craftablerarities)  DIR=craftablerarities;        FILTER=craftablerarities ;;
            smartwarehouse) DIR=smartwarehouse; FILTER=smartwarehouse ;;
            *) echo "::error::Unknown package: $PKG"; exit 1 ;;
          esac
          echo "dir=$DIR" >> $GITHUB_OUTPUT
          echo "filter=$FILTER" >> $GITHUB_OUTPUT

      - name: Read package.json
        id: pkg
        run: |
          DIR="${{ steps.resolve.outputs.dir }}"
          CN=$(jq -r '.productName' "mcaddon/$DIR/package.json")
          HAS_BUILD=$(jq 'has("build")' "mcaddon/$DIR/package.json")
          echo "cn=$CN" >> $GITHUB_OUTPUT
          echo "hasBuild=$HAS_BUILD" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version
        run: pnpm --filter "${{ steps.resolve.outputs.filter }}" pkg set version="${{ steps.parse.outputs.version }}"

      - name: Build
        if: steps.pkg.outputs.hasBuild == 'true'
        run: pnpm --filter "${{ steps.resolve.outputs.filter }}" run build

      - name: Pack
        run: pnpm --filter "${{ steps.resolve.outputs.filter }}" run mcaddon

      - name: Locate artifact
        id: artifact
        run: |
          ARTIFACT=$(find mcaddon -path "*/dist/packages/*" \( -name "*.mcaddon" -o -name "*.mcpack" \) ! -name "*_bp*.mcpack" ! -name "*_rp*.mcpack" 2>/dev/null | head -1)
          echo "path=$ARTIFACT"
          echo "path=$ARTIFACT" >> $GITHUB_OUTPUT

      - name: Upload to release
        if: github.event_name == 'push' && steps.artifact.outputs.path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          FILE="${{ steps.artifact.outputs.path }}"
          IS_PR=""; echo "${{ steps.parse.outputs.version }}" | grep -qiE 'beta|alpha|rc|pre' && IS_PR="--prerelease"
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" "$FILE" --clobber
          else
            gh release create "$TAG" "$FILE" --title "${{ steps.pkg.outputs.cn }} ${{ steps.parse.outputs.version }}" --notes "自动构建发布" ${IS_PR}
          fi

      - name: Upload as artifact
        if: github.event_name == 'workflow_dispatch' && steps.artifact.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.cn }}-${{ steps.parse.outputs.version }}
          path: ${{ steps.artifact.outputs.path }}
