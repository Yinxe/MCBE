name: Build & Release

on:
  push:
    tags:
      - "*@*"
  workflow_dispatch:
    inputs:
      mod:
        description: "模组名 (如 mock-player, smartwarehouse)"
        required: true
        type: string
      version:
        description: "版本号 (如 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Parse tag / input
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            PKG="${TAG%%@*}"
            VER="${TAG#*@}"
          else
            PKG="${{ inputs.mod }}"
            VER="${{ inputs.version }}"
          fi
          echo "pkg=$PKG" >> $GITHUB_OUTPUT
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Resolve mod directory
        id: resolve
        run: |
          PKG="${{ steps.parse.outputs.pkg }}"
          case "$PKG" in
            mock-player)        DIR=mock-player;             FILTER=mock-player ;;
            keepinventory) DIR=keepinventory;   FILTER=keepinventory ;;
            craftablerarities)  DIR=craftablerarities;        FILTER=craftablerarities ;;
            smartwarehouse) DIR=smartwarehouse; FILTER=smartwarehouse ;;
            *) echo "::error::Unknown package: $PKG"; exit 1 ;;
          esac
          echo "dir=$DIR" >> $GITHUB_OUTPUT
          echo "filter=$FILTER" >> $GITHUB_OUTPUT

      - name: Read package.json
        id: pkg
        run: |
          DIR="${{ steps.resolve.outputs.dir }}"
          CN=$(jq -r '.productName' "mcaddon/$DIR/package.json")
          HAS_BUILD=$(jq 'has("build")' "mcaddon/$DIR/package.json")
          ARTIFACT_TYPE=$(jq -r '.mcbe.releaseArtifact // "addon"' "mcaddon/$DIR/package.json")
          echo "cn=$CN" >> $GITHUB_OUTPUT
          echo "hasBuild=$HAS_BUILD" >> $GITHUB_OUTPUT
          echo "artifactType=$ARTIFACT_TYPE" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version
        run: cd mcaddon/${{ steps.resolve.outputs.dir }} && npm pkg set version="${{ steps.parse.outputs.version }}"

      - name: Build
        if: steps.pkg.outputs.hasBuild == 'true'
        run: pnpm --filter "${{ steps.resolve.outputs.filter }}" run build

      - name: Pack
        run: pnpm --filter "${{ steps.resolve.outputs.filter }}" run mcaddon

      - name: Locate artifact
        id: artifact
        run: |
          DIR="mcaddon/${{ steps.resolve.outputs.dir }}"
          TYPE="${{ steps.pkg.outputs.artifactType }}"
          case "$TYPE" in
            pack)  PATTERN="*.mcpack"  ;;
            addon) PATTERN="*.mcaddon" ;;
            *)     PATTERN="*.mcaddon" ;;
          esac
          ARTIFACT=$(find "$DIR/dist/packages" -name "$PATTERN" ! -name "*_bp_bp*" ! -name "*_rp*" -type f 2>/dev/null | head -1)
          echo "path=$ARTIFACT"
          echo "path=$ARTIFACT" >> $GITHUB_OUTPUT

      - name: Upload to release
        if: steps.artifact.outputs.path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.parse.outputs.pkg }}@${{ steps.parse.outputs.version }}"
          FILE="${{ steps.artifact.outputs.path }}"
          CN="${{ steps.pkg.outputs.cn }}"
          VERSION="${{ steps.parse.outputs.version }}"
          TYPE="${{ steps.pkg.outputs.artifactType }}"
          IS_PR=""; echo "$VERSION" | grep -qiE 'beta|alpha|rc|pre' && IS_PR="--prerelease"

          # 构造文件名中的中文部分
          ASSET_NAME="${CN}-v${VERSION}"
          if [ "$TYPE" = "addon" ]; then
            ASSET_NAME="${ASSET_NAME}.mcaddon"
          elif echo "$FILE" | grep -q '_bp\.mcpack$'; then
            ASSET_NAME="${ASSET_NAME}_bp.mcpack"
          else
            ASSET_NAME="${ASSET_NAME}.mcpack"
          fi

          # 创建 release（如不存在）
          if ! gh release view "$TAG" &>/dev/null; then
            gh release create "$TAG" --title "$CN $VERSION" --notes "自动构建发布" ${IS_PR}
          fi

          # 先以 ASCII 名上传（避免中文编码问题），再通过 API 重命名
          ASCII_NAME="$(echo "$ASSET_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g')"
          echo "ASSET_NAME=[$ASSET_NAME]"
          echo "ASCII_NAME=[$ASCII_NAME]"
          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" --jq '.id')
          RESP=$(curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$ASCII_NAME" \
            --data-binary "@$FILE")
          ASSET_ID=$(echo "$RESP" | jq -r '.id')
          echo "Uploaded asset:$ASSET_ID"
          PATCH_RESP=$(gh api -X PATCH "repos/${{ github.repository }}/releases/assets/$ASSET_ID" \
            --input <(echo "{\"name\":\"$ASSET_NAME\"}"))
          echo "Rename result:$(echo "$PATCH_RESP" | jq -c '{name: .name, id: .id}')"

      - name: Upload as artifact
        if: github.event_name == 'workflow_dispatch' && steps.artifact.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.cn }}-${{ steps.parse.outputs.version }}
          path: ${{ steps.artifact.outputs.path }}
