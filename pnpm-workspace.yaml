# pnpm workspace configuration
# See: https://pnpm.io/workspaces

packages:
  # all packages in subdirectories of packages/
  - "packages/*"
  # all packages in subdirectories of apps/
  - "apps/*"
  # addon projects (Minecraft behavior/resource packs)
  - "mcaddon/*"
  # exclude test directories
  - "!**/test/**"
allowBuilds:
  esbuild: true
