name: Build & Release .mcaddon

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (如 0.1.0-beta)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Extract version
        id: version
        run: |
          # 优先级：手动输入 > git tag > 读取 package.json（兜底）
          RAW="${{ inputs.version || github.ref_name }}"
          # 容错：如果 tag 是 refs/tags/v0.1.0 格式，github.ref_name 已经是 v0.1.0
          # 但为了安全，统一去掉开头非数字部分
          CLEAN="$(echo "$RAW" | sed 's/^[^0-9]*//')"
          if [ -z "$CLEAN" ]; then
            echo "✗ 无法从输入 '$RAW' 提取版本号"
            exit 1
          fi
          echo "version=$CLEAN" >> $GITHUB_OUTPUT
          echo "提取版本号: $RAW → $CLEAN"

      - name: Install dependencies
        run: npm ci

      - name: Build & Package
        env:
          PROJECT_NAME: ${{ vars.PROJECT_NAME || 'my-addon' }}
        run: |
          VER="${{ steps.version.outputs.version }}"
          echo "Building version: $VER"

          # 更新 package.json 版本以同步 manifest 及输出文件名
          npm pkg set version="$VER"

          # 一键构建打包
          npm run mcaddon

          echo "Package created:"
          ls -lh dist/packages/

      - name: Upload to release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_FILE=$(ls dist/packages/*.mcaddon | head -1)
          RELEASE_TAG="${{ github.ref_name }}"
          IS_PRERELEASE=""
          if echo "${{ steps.version.outputs.version }}" | grep -qiE 'beta|alpha|rc|pre'; then
            IS_PRERELEASE="--prerelease"
          fi

          if gh release view "$RELEASE_TAG" &>/dev/null; then
            gh release upload "$RELEASE_TAG" "$PACKAGE_FILE" --clobber
          else
            gh release create "$RELEASE_TAG" \
              "$PACKAGE_FILE" \
              --title "$RELEASE_TAG" \
              --notes "自动构建发布" \
              ${IS_PRERELEASE}
          fi

      - name: Upload as artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: my-addon-${{ steps.version.outputs.version }}
          path: dist/packages/*.mcaddon
